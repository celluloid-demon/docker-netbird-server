
# Rendered by official install script:
#   curl -fsSL https://github.com/netbirdio/netbird/releases/latest/download/getting-started.sh | bash

# Generated files:
#   docker-compose.yml  Docker Compose configuration with all services
#   config.yaml         Combined server configuration (management, signal, relay, STUN)
#   dashboard.env       Environment variables for the dashboard container
#   proxy.env           Environment variables for the proxy container (only when proxy is enabled)

services:
  # UI dashboard
  dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    networks: [netbird, nginx-proxy-manager]
    ports:
      - '127.0.0.1:8080:80'
    env_file:
      - ./dashboard.env
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # Combined server (Management + Signal + Relay + STUN)
  netbird-server:
    image: netbirdio/netbird-server:latest
    container_name: netbird-server
    restart: unless-stopped
    networks: [netbird, nginx-proxy-manager]
    ports:
      - '127.0.0.1:8081:80'
      - '3478:3478/udp'
    volumes:
      - netbird_data:/var/lib/netbird
      - ./config.yaml:/etc/netbird/config.yaml
    command: ["--config", "/etc/netbird/config.yaml"]
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

volumes:
  netbird_data:

networks:
  netbird:
  nginx-proxy-manager:
    external: true
