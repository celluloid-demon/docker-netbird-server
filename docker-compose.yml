---
services:
  # UI dashboard
  netbird-dashboard:
    image: ${DASHBOARD_IMAGE:-netbirdio/dashboard}:${DASHBOARD_TAG:-latest}
    container_name: netbird-dashboard
    restart: unless-stopped
    networks: [netbird, nginx-proxy-manager]
    ports:
      - '127.0.0.1:8080:80'
    env_file:
      - ${DASHBOARD_ENV_FILE:-./dashboard.env}
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # Combined server (Management + Signal + Relay + STUN)
  netbird-server:
    image: ${SERVER_IMAGE:-netbirdio/netbird-server}:${SERVER_TAG:-latest}
    container_name: netbird-server
    restart: unless-stopped
    networks: [netbird, nginx-proxy-manager]
    ports:
      - '127.0.0.1:8081:80'
      - '3478:3478/udp'
    volumes:
      - netbird_data:/var/lib/netbird
      - ${CONFIG_FILE:-./config.yaml}:/etc/netbird/config.yaml
    command: ["--config", "/etc/netbird/config.yaml"]
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

volumes:
  netbird_data:

networks:
  netbird:
  nginx-proxy-manager:
    external: true
